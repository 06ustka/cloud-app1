name: Build and deploy Node.js app to Azure Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Build
        run: |
          npm install
          npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: "https://api-task-juliawr-d8d6ara7fygcekdk.polandcentral-01.azurewebsites.net/api"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: dist

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4F74F64104B3480EA15C263B3E8503DA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4DC9E9BDA6544A0DBC9E3F964DBD5C6A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2A84894A3FB54C52BD081AFA02422B3F }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'frontend-task-juliawr'
          package: dist
          startup-command: "pm2 serve /home/site/wwwroot --no-daemon --spa"
