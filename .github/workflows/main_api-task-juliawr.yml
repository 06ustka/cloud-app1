name: Ultimate_Fix_Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        # Publikujemy bezpośrednio do folderu 'deploy'
        run: dotnet publish backend/Backend.csproj -c Release -o ./deploy

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'api-task-juliawr'
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./deploy
          
